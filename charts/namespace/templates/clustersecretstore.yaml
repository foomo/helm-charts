{{- range $key, $value := .Values.clusterSecretStores }}
{{- if and (lookup "v1" "Namespace" "" "") (not ($.Capabilities.APIVersions.Has "external-secrets.io/v1/ClusterSecretStore")) }}
{{- fail (printf "ClusterSecretStore '%s' requires the external-secrets.io/v1 CRD. Install the External Secrets Operator first." $key) }}
{{- end }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $key }}
  labels:
    {{- include "namespace.labels" $ | nindent 4 }}
    {{- with $value.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $value.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $value.controller }}
  controller: {{ . }}
  {{- end }}
  {{- with $value.conditions }}
  conditions: {{- toYaml . | nindent 4 }}
  {{- end }}
  provider: {{- toYaml $value.provider | nindent 4 }}
---
{{- end }}
