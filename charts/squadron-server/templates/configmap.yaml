{{- if .Values.configMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "squadron.server.fullname" . }}
  labels: {{- include "squadron.server.labels" . | nindent 4 }}
  namespace: {{ include "squadron.server.namespace" . }}
data: {{- toYaml .Values.configMap  | nindent 2 }}
{{- end }}
