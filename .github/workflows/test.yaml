name: PR check

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout/releases
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # https://github.com/jdx/mise-action/releases
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Install dependencies
        run: make deps

      - name: Run Helm lint
        run: make lint

      - name: Run Helm docs
        run: |
          make docs
          if ! git diff --exit-code; then
              echo "Documentation not up to date. Please run `make docs` and commit changes!" >&2
              exit 1
          fi

      - name: Run Helm schema
        run: |
          make schema
          if ! git diff --exit-code; then
              echo "Documentation not up to date. Please run `make schema` and commit changes!" >&2
              exit 1
          fi
