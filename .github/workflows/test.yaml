name: PR check

on:
  push:
    branches: [ main ]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout/releases
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # https://github.com/jdx/mise-action/releases
      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Install dependencies
        run: make deps

      - name: Run Helm lint
        run: make lint

      - name: Run Helm docs
        run: |
          make docs
          if ! git diff --exit-code; then
              echo "Documentation not up to date. Please run `make docs` and commit changes!" >&2
              exit 1
          fi

      - name: Run Helm schema
        run: |
          make schema
          if ! git diff --exit-code; then
              echo "Documentation not up to date. Please run `make schema` and commit changes!" >&2
              exit 1
          fi
